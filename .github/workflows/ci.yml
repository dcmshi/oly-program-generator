name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  PYTHONUTF8: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - name: Ruff
        run: uvx ruff check .

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: oly-agent
        run: uv sync --extra dev --extra web
      - name: Run agent tests
        run: make test-agent

  test-ingestion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: oly-ingestion
        run: uv sync --extra dev
      - name: Run ingestion tests
        run: make test-ingestion
