# alembic.ini — Alembic configuration for oly-agent
#
# Usage (from oly-agent/):
#   uv run alembic upgrade head        # apply all pending migrations
#   uv run alembic current             # show current revision
#   uv run alembic history             # show migration history
#   uv run alembic revision -m "..."   # create a new migration script
#   uv run alembic downgrade -1        # roll back one migration
#
# Existing database (schema already applied):
#   uv run alembic stamp head          # mark as current without running DDL
#
# DATABASE_URL is read from the environment (or shared/config.py) — never hardcoded here.

[alembic]
script_location = migrations

# sqlalchemy.url is intentionally blank — set dynamically in migrations/env.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
