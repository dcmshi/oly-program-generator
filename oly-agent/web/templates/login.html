<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Oly Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="flex items-center justify-center gap-3 text-3xl font-bold tracking-tight">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" fill="none" class="h-10 w-auto">
          <rect x="0" y="13" width="92" height="2" rx="1" fill="#94A3B8"/>
          <rect x="2"  y="10" width="4" height="8"  rx="0.75" fill="#22C55E"/>
          <rect x="6"  y="8"  width="5" height="12" rx="1"    fill="#FBBF24"/>
          <rect x="11" y="6"  width="5" height="16" rx="1"    fill="#3B82F6"/>
          <rect x="16" y="4"  width="5" height="20" rx="1"    fill="#EF4444"/>
          <rect x="21" y="8"  width="4" height="12" rx="1"    fill="#64748B"/>
          <rect x="67" y="8"  width="4" height="12" rx="1"    fill="#64748B"/>
          <rect x="71" y="4"  width="5" height="20" rx="1"    fill="#EF4444"/>
          <rect x="76" y="6"  width="5" height="16" rx="1"    fill="#3B82F6"/>
          <rect x="81" y="8"  width="5" height="12" rx="1"    fill="#FBBF24"/>
          <rect x="86" y="10" width="4" height="8"  rx="0.75" fill="#22C55E"/>
        </svg>
        Oly Agent
      </span>
      <p class="text-gray-500 text-sm mt-2">
        No account yet?
        <a href="/setup" class="text-gray-900 font-medium hover:underline">Create one</a>
      </p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <h1 class="text-lg font-semibold mb-6">Sign in</h1>

      {% if error %}
      <div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 rounded text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input
            id="username" name="username" type="text"
            autocomplete="username" required autofocus
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
          >
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            id="password" name="password" type="password"
            autocomplete="current-password" required
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
          >
        </div>
        <button
          type="submit"
          class="w-full py-2 px-4 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors"
        >
          Sign in
        </button>
      </form>
    </div>
  </div>

</body>
</html>
