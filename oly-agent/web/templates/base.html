<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Oly Agent{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    [x-cloak] { display: none; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Nav -->
  <nav class="bg-gray-900 text-white px-6 py-3 flex items-center gap-6 shadow">
    <a href="/" class="flex items-center gap-2 font-bold text-lg tracking-tight">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 28" fill="none" class="h-7 w-auto">
        <!-- bar shaft -->
        <rect x="0" y="13" width="92" height="2" rx="1" fill="#CBD5E1"/>
        <!-- left plates: green(10kg) · yellow(15kg) · blue(20kg) · red(25kg) -->
        <rect x="2"  y="10" width="4" height="8"  rx="0.75" fill="#22C55E"/>
        <rect x="6"  y="8"  width="5" height="12" rx="1"    fill="#FBBF24"/>
        <rect x="11" y="6"  width="5" height="16" rx="1"    fill="#3B82F6"/>
        <rect x="16" y="4"  width="5" height="20" rx="1"    fill="#EF4444"/>
        <!-- left collar -->
        <rect x="21" y="8"  width="4" height="12" rx="1"    fill="#64748B"/>
        <!-- right collar -->
        <rect x="67" y="8"  width="4" height="12" rx="1"    fill="#64748B"/>
        <!-- right plates: red(25kg) · blue(20kg) · yellow(15kg) · green(10kg) -->
        <rect x="71" y="4"  width="5" height="20" rx="1"    fill="#EF4444"/>
        <rect x="76" y="6"  width="5" height="16" rx="1"    fill="#3B82F6"/>
        <rect x="81" y="8"  width="5" height="12" rx="1"    fill="#FBBF24"/>
        <rect x="86" y="10" width="4" height="8"  rx="0.75" fill="#22C55E"/>
      </svg>
      Oly Agent
    </a>
    <a href="/" class="text-gray-300 hover:text-white text-sm">Dashboard</a>
    <a href="/program" class="text-gray-300 hover:text-white text-sm">Programs</a>
    <a href="/generate" class="text-gray-300 hover:text-white text-sm">Generate</a>
    <div class="ml-auto flex items-center gap-4">
      {% if request.session.get("athlete_name") %}
      <a href="/profile" class="text-gray-400 hover:text-white text-sm">{{ request.session.get("athlete_name") }}</a>
      {% endif %}
      <form method="post" action="/logout">
        <button type="submit" class="text-gray-300 hover:text-white text-sm">Logout</button>
      </form>
    </div>
  </nav>

  <!-- Content -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
