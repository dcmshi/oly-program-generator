[project]
name = "oly-agent"
version = "0.1.0"
description = "Olympic weightlifting programming agent"
requires-python = ">=3.11"
dependencies = [
    # Database
    "psycopg2-binary>=2.9.9",
    # LLM
    "anthropic>=0.25.0",
    # Utilities
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
web = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.9",
    "slowapi>=0.1.9",
    "bcrypt>=4.0.0",
    "itsdangerous>=2.1.0",
    # Optional: install redis>=4.0 separately to enable Redis-backed rate limiting
]
dev = [
    "pytest>=8.0.0",
]

[tool.uv]
package = false
