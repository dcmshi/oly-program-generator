# docker-compose.yml
# Run: docker compose up -d
# Dev defaults: postgresql://oly:oly@localhost:5432/oly_programming
# Production:   set POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB in environment or .env

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: oly-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oly}
      POSTGRES_DB: ${POSTGRES_DB:-oly_programming}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oly} -d ${POSTGRES_DB:-oly_programming}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oly-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
